name: Reestructuras - Actualización de Datos

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * *"   # 12:00 AM Colombia
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ejecutar Notebook
        env:
          MI_JSON: ${{ secrets.MI_JSON }}
          USER_API: ${{ secrets.USER_API }}
          SECRET_API: ${{ secrets.SECRET_API }}
        run: |
          papermill src/calculator/core/Reestructuras_Pre_Calc.ipynb output.ipynb

      - name: Subir archivos generados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv data/*.parquet
          git commit -m "Actualización automática de datos" || echo "No hay cambios"
          git push
