name: Ejecutar Flujo Diario

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * *"   # 12:00 AM Colombia
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install papermill nbconvert ipykernel
          python -m ipykernel install --user --name python3

      - name: Ejecutar Notebook
        env:
          MI_JSON: ${{ secrets.MI_JSON }}
          USER_API: ${{ secrets.USER_API }}
          SECRET_API: ${{ secrets.SECRET_API }}
        run: |
          papermill src/calculator/core/Reestructuras_Pre_Calc.ipynb output.ipynb

      - name: Subir archivos generados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv data/*.parquet
          git commit -m "Actualización automática de datos" || echo "No hay cambios"
          git push
